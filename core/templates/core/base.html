{% load static %} 
<!--Aqui se cargan los archivos staticos, para poder acceder a ellos, si no se cargan Django intenta acceder a los recursos desde sus archivos base-->
<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href={% static 'css/stiles.css' %}> <!-- Aqui se importa el documento css que se utilizara para estilar este documento html-->
    <!-- Porm medio de este enlace se accede a los archivos de boostrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Aplicacion</title>
</head>
<body>
    <nav>
        <div class="logo"> <img src= {% static 'src/Logo.png' %} alt="Logo"></div>
        <ul>
            <li><a href={% url 'home' %}>Inicio</a></li>
            <li><a href={% url 'exit' %}>Salir</a></li>
        </ul>
    </nav>
   
    {% block content %}{% endblock %} <!-- Aqui se realiza la creacion de un bloque de contenido-->
</body>
</html>
